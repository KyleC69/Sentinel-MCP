name: Build & Release Plugin

on:
  push:
    branches:
      - master

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version from date + commit
        id: version
        run: echo "VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Generate ZIP file
        run: |
          mkdir -p dist
          zip -r "dist/plugin-${VERSION}.zip" . -x ".git/*" ".github/*" "dist/*"

      - name: Update CHANGELOG.md
        run: |
          echo "## ${VERSION}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log -1 --pretty=format:"- %s" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit updated changelog
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git commit -m "Update changelog for ${VERSION}" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Plugin Release ${{ env.VERSION }}"
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to GitHub Packages
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ env.VERSION }}
          path: dist/plugin-${{ env.VERSION }}.zip
