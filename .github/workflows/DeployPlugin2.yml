name: Build & Release Plugin

on:
  push:
    branches:
      - master

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version from date + commit
        id: version
        run: echo "VERSION=2.0.0-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Generate ZIP file
        run: |
          mkdir -p dist
          zip -r "dist/sentinel-mcp-${VERSION}.zip" sentinel-mcp

      - name: Create tag
        run: git tag "v${VERSION}" && git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Wordpress Plugin Release ${{ env.VERSION }}"
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to GitHub Packages
        uses: actions/upload-artifact@v4
        with:
          name: Sentinel-MCP plugin-${{ env.VERSION }}
          path: dist/sentinel-mcp-${{ env.VERSION }}.zip
